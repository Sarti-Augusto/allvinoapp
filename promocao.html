<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Promoção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4 shadow-sm">
        <button onclick="history.back()"><span class="material-symbols-outlined text-black">arrow_back</span></button>
        <div class="h-8"><img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto scale-125"></div>
        <div class="w-8"></div>
    </header>

    <main class="max-w-4xl mx-auto px-5 pt-8">
        <div class="bg-white rounded-3xl overflow-hidden shadow-lg border border-stone-100">
            <div class="h-64 bg-stone-100 relative">
                <img src="banner-promo.jpg" alt="Pack Allvino" class="w-full h-full object-cover">
                <div class="absolute top-4 right-4 bg-[#B91C1C] text-white font-bold text-xs px-3 py-1 rounded-full uppercase tracking-widest animate-pulse">Oferta Ativa</div>
            </div>
            <div class="p-8">
                <h1 class="font-serif text-3xl font-bold mb-4">Pack 3x Arkos Vinho Verde</h1>
                <p class="text-stone-600 mb-8 leading-relaxed">O frescor de Portugal direto para o Espírito Santo.</p>
                <div class="bg-stone-50 p-6 rounded-2xl border flex flex-col md:flex-row justify-between gap-6">
                    <div><span class="text-4xl font-bold text-black">R$ 229,90</span><span class="text-sm font-bold text-green-600 block">Economia de R$ 39,80</span></div>
                    <button onclick="comprarPromo()" class="bg-[#B91C1C] text-white px-8 py-4 rounded-xl font-bold uppercase shadow-lg active:scale-95 transition">Adicionar Pack</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="bg-white/90 backdrop-blur-md fixed bottom-0 left-0 w-full z-40 rounded-t-2xl border-t border-stone-100 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] flex justify-around items-center px-6 pb-6 pt-3">
        <a class="flex flex-col items-center text-stone-400" href="index.html"><span class="material-symbols-outlined">home</span><span class="text-[10px] uppercase font-bold">Início</span></a>
        <a class="flex flex-col items-center text-[#B91C1C]" href="catalogo.html"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apps</span><span class="text-[10px] uppercase">Catálogo</span></a>
        <a class="flex flex-col items-center text-stone-400" href="login.html"><span class="material-symbols-outlined">person</span><span class="text-[10px] uppercase font-bold">Conta</span></a>
    </nav>

    <script>
        function comprarPromo() {
            let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
            const item = {nome: "Pack 3x Arkos Vinho Verde", preco: 229.90, img: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=100", qtd: 1};
            const exist = cart.find(x => x.nome === item.nome);
            if(exist) exist.qtd += 1; else cart.push(item);
            localStorage.setItem('allvino_cart', JSON.stringify(cart));
            window.location.href = 'catalogo.html';
        }
    </script>
</body>
</html>
