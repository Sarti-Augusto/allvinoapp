<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Login Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#111111] min-h-screen flex items-center justify-center p-5">
    <div class="w-full max-w-md bg-[#1a1a1a] border border-stone-800 rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-center mb-8 h-12">
            <img src="LOGO-ALLVINO-BRANCO.png" alt="Allvino Admin" class="h-full object-contain">
        </div>
        
        <h1 class="text-white text-xl font-bold text-center mb-2">Portal da Loja</h1>
        <p class="text-stone-400 text-sm text-center mb-8">Acesso restrito à Gerência e Consultoria de Vendas.</p>

        <form onsubmit="event.preventDefault(); window.location.href='admin.html';" class="space-y-5">
            <div>
                <label class="text-xs font-bold text-stone-400 uppercase tracking-wider block mb-2">E-mail Corporativo</label>
                <input type="email" placeholder="theo@allvino.com.br" required class="w-full bg-[#0a0a0a] border border-stone-700 text-white rounded-xl py-3 px-4 outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-xs font-bold text-stone-400 uppercase tracking-wider block mb-2">Senha</label>
                <input type="password" placeholder="••••••••" required class="w-full bg-[#0a0a0a] border border-stone-700 text-white rounded-xl py-3 px-4 outline-none focus:border-red-600 transition-colors">
            </div>
            
            <button type="submit" class="w-full bg-[#B91C1C] text-white py-4 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-red-800 transition-colors mt-4 shadow-lg shadow-red-900/20">
                Aceder ao Painel
            </button>
        </form>

        <p class="text-center text-stone-500 text-xs mt-8 font-medium">
            Problemas no acesso? Fale com o suporte técnico.
        </p>
    </div>
</body>
</html>
