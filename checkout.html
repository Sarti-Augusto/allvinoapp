<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="p-5 max-w-xl mx-auto pb-32">
    <div class="flex justify-center mb-8 h-12 mt-4">
        <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-150">
    </div>

    <header class="flex items-center gap-4 mb-8">
        <button onclick="history.back()"><span class="material-symbols-outlined text-black">arrow_back</span></button>
        <h1 class="text-xl font-bold text-black">Finalizar Pedido</h1>
    </header>

    <section class="space-y-8">
        <div class="space-y-4">
            <h2 class="font-bold text-stone-400 text-xs uppercase tracking-widest">Forma de Recebimento</h2>
            <div class="space-y-3">
                <label class="flex items-center justify-between p-5 bg-white rounded-2xl border border-stone-200 cursor-pointer transition hover:border-black">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="entrega" value="Retirada" onchange="toggleEndereco(false)" class="text-black focus:ring-black w-4 h-4">
                        <span class="font-bold text-black">Retirar na Loja</span>
                    </div>
                    <span class="text-xs font-bold text-green-700 bg-green-100 px-3 py-1.5 rounded-lg">-10% OFF</span>
                </label>
                <label class="flex items-center gap-3 p-5 bg-white rounded-2xl border border-stone-200 cursor-pointer transition hover:border-black">
                    <input type="radio" name="entrega" value="Delivery" onchange="toggleEndereco(true)" checked class="text-black focus:ring-black w-4 h-4">
                    <span class="font-bold text-black">Receber em casa</span>
                </label>
            </div>
        </div>

        <div id="bloco-endereco" class="space-y-4">
            <h2 class="font-bold text-stone-400 text-xs uppercase tracking-widest flex justify-between items-center">Endereço de Entrega <span id="cep-loading" class="text-[#B91C1C] text-[10px] hidden">Buscando...</span></h2>
            <input id="cep" type="text" maxlength="9" placeholder="CEP (00000-000)" class="w-full p-4 rounded-2xl bg-white border border-stone-200 outline-none focus:border-black font-bold shadow-sm">
            <input id="rua" placeholder="Rua" class="w-full p-4 rounded-2xl bg-stone-100 border-none outline-none text-sm text-stone-600" readonly>
            <div class="grid grid-cols-2 gap-4">
                <input id="numero" placeholder="Nº" class="p-4 rounded-2xl bg-white border border-stone-200 outline-none focus:border-black shadow-sm">
                <input id="bairro" placeholder="Bairro" class="p-4 rounded-2xl bg-stone-100 border-none outline-none text-sm text-stone-600" readonly>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="font-bold text-stone-400 text-xs uppercase tracking-widest">Pagamento</h2>
            <div class="space-y-3">
                <label class="flex items-center p-5 bg-white rounded-2xl border border-stone-200 gap-3 cursor-pointer transition hover:border-black">
                    <input type="radio" name="pag" value="PIX" checked class="text-black focus:ring-black w-4 h-4"> 
                    <span class="font-bold text-black">PIX</span>
                </label>
                <label class="flex items-center p-5 bg-white rounded-2xl border border-stone-200 gap-3 cursor-pointer transition hover:border-black">
                    <input type="radio" name="pag" value="Cartão de Crédito" class="text-black focus:ring-black w-4 h-4"> 
                    <span class="font-bold text-black">Cartão de Crédito</span>
                </label>
            </div>
        </div>
    </section>

    <footer class="fixed bottom-0 left-0 w-full p-5 bg-white border-t border-stone-100 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.04)]">
        <button onclick="enviar()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg flex items-center justify-center gap-2">
            Confirmar no WhatsApp <span class="material-symbols-outlined">send</span>
        </button>
    </footer>

    <script>
        // Mostra ou Esconde o bloco de endereço
        function toggleEndereco(mostrar) {
            document.getElementById('bloco-endereco').style.display = mostrar ? 'block' : 'none';
        }

        // Busca o CEP via API
        document.getElementById('cep').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if(v.length === 8) {
                document.getElementById('cep-loading').classList.remove('hidden');
                fetch(`https://viacep.com.br/ws/${v}/json/`).then(r => r.json()).then(d => {
                    document.getElementById('cep-loading').classList.add('hidden');
                    if(!d.erro){
                        document.getElementById('rua').value = d.logradouro;
                        document.getElementById('bairro').value = d.bairro;
                        document.getElementById('numero').focus();
                    }
                });
            }
        });

        // Envia para o WhatsApp correto com os cálculos
        function enviar() {
            const cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
            if(cart.length === 0) return alert("Sua seleção está vazia!");
            
            // WhatsApp Atualizado
            const fone = "552732619494";
            const entrega = document.querySelector('input[name="entrega"]:checked').value;
            const pag = document.querySelector('input[name="pag"]:checked').value;
            
            let subtotal = 0;
            let msg = `Olá, Allvino! 🍷\n*Novo Pedido:*\n\n`;
            
            cart.forEach(x => {
                subtotal += (x.preco * x.qtd);
                msg += `• ${x.qtd}x ${x.nome} (R$ ${x.preco.toFixed(2)})\n`;
            });
            
            let total = subtotal;
            
            // Aplica regra de 10% de desconto na Retirada
            if(entrega === "Retirada") {
                total = subtotal * 0.90;
                msg += `\n*Forma de Recebimento:* Retirada na Loja (10% OFF)`;
            } else {
                const rua = document.getElementById('rua').value;
                const num = document.getElementById('numero').value;
                if(!rua || !num) return alert("Por favor, preencha o endereço completo da entrega!");
                msg += `\n*Forma de Recebimento:* Delivery\n*Endereço:* ${rua}, ${num}`;
            }

            msg += `\n*Forma de Pagamento:* ${pag}`;
            msg += `\n*Total a pagar:* R$ ${total.toFixed(2).replace('.',',')}`;

            window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
