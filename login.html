<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>body { background-color: #FDFBF7; font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5">
    
    <div class="w-full max-w-sm">
        <div class="flex justify-center mb-10 h-10">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-125">
        </div>

        <h1 class="text-2xl font-bold text-black text-center mb-2">Bem-vindo de volta</h1>
        <p class="text-stone-500 text-sm text-center mb-8">Aceda à sua adega digital.</p>

        <form onsubmit="event.preventDefault(); window.location.href='catalogo.html';" class="space-y-4">
            <div>
                <input type="email" placeholder="Seu e-mail" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>
            <div>
                <input type="password" placeholder="Sua senha" required class="w-full bg-white border border-stone-200 text-black rounded-2xl py-4 px-5 outline-none focus:border-black transition-colors shadow-sm">
            </div>
            
            <div class="flex justify-end mb-4">
                <a href="#" class="text-xs font-bold text-stone-500 hover:text-black">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-transform shadow-xl">
                Entrar
            </button>
        </form>

        <p class="text-center text-sm font-bold text-stone-400 mt-8">
            Novo por aqui? <a href="#" class="text-black hover:underline">Criar uma conta</a>
        </p>
    </div>

</body>
</html>
