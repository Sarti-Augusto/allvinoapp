<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Catálogo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #FDFBF7; scroll-behavior: smooth; font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100 flex justify-between items-center w-full px-5 py-4">
        <button class="p-1"><span class="material-symbols-outlined">menu</span></button>
        <div class="h-8"><img src="LOGO-ALLVINO-PRETO.png" alt="Allvino" class="h-full w-auto object-contain scale-125"></div>
        <button onclick="toggleCart()" class="relative p-1">
            <span class="material-symbols-outlined">shopping_bag</span>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-[#B91C1C] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold hidden border border-white">0</span>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-5 pt-6">
        <a href="#vinhos" class="relative overflow-hidden rounded-3xl bg-black h-[380px] flex flex-col justify-end p-8 block group shadow-lg">
            <img class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-1000" src="https://images.unsplash.com/photo-1572913017567-02f06497ce10?auto=format&fit=crop&w=800">
            <div class="relative z-10 space-y-2">
                <span class="text-[10px] text-white uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm">Seleção Capixaba</span>
                <h2 class="text-4xl text-white font-bold font-serif">Arkos Vinho Verde</h2>
                <p class="text-white/80 text-sm max-w-xs pb-4">O frescor de Portugal que combina com o clima do nosso estado.</p>
                <div class="bg-white text-black font-bold text-xs px-6 py-3 rounded-full w-fit flex items-center gap-2">APROVEITAR OFERTA <span class="material-symbols-outlined text-sm">arrow_forward</span></div>
            </div>
        </a>

        <div id="vinhos" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100">
                <div class="aspect-[3/4] bg-stone-50 rounded-2xl flex items-center justify-center p-6 mb-4"><img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=300" class="h-full object-contain mix-blend-multiply"></div>
                <h3 class="font-bold text-xl">Arkos Vinho Verde</h3>
                <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mt-1">Portugal • Branco</p>
                <div class="flex justify-between items-center mt-5">
                    <span class="text-2xl font-bold">R$ 89,90</span>
                    <button onclick="addToCart('Arkos Vinho Verde', 89.90, 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=100')" class="bg-black text-white p-3 rounded-2xl active:scale-90 transition"><span class="material-symbols-outlined">add_shopping_cart</span></button>
                </div>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100">
                <div class="aspect-[3/4] bg-stone-50 rounded-2xl flex items-center justify-center p-6 mb-4"><img src="https://images.unsplash.com/photo-1585553616435-2dc0a54e271d?auto=format&fit=crop&w=300" class="h-full object-contain mix-blend-multiply"></div>
                <h3 class="font-bold text-xl">Ziar Rosé</h3>
                <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mt-1">100% Cabernet Sauvignon</p>
                <div class="flex justify-between items-center mt-5">
                    <span class="text-2xl font-bold">R$ 95,50</span>
                    <button onclick="addToCart('Ziar Rosé', 95.50, 'https://images.unsplash.com/photo-1585553616435-2dc0a54e271d?auto=format&fit=crop&w=100')" class="bg-black text-white p-3 rounded-2xl active:scale-90 transition"><span class="material-symbols-outlined">add_shopping_cart</span></button>
                </div>
            </div>
        </div>
    </main>

    <div id="cart-overlay" class="fixed inset-0 z-50 flex justify-end hidden opacity-0 transition-all duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div id="cart-panel" class="relative w-full max-w-md h-full bg-white flex flex-col transform translate-x-full transition-transform">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Sua Seleção</h2>
                <button onclick="toggleCart()"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-6 bg-stone-50 border-t space-y-4">
                <label class="flex items-center justify-between p-4 bg-white rounded-2xl border border-stone-200 cursor-pointer">
                    <div class="flex items-center gap-3"><input type="checkbox" id="retirada" onchange="renderCart()" class="text-[#B91C1C] rounded focus:ring-0"> <span class="font-bold text-sm">Retirada na Loja</span></div>
                    <span class="text-xs font-bold text-green-600">-5% OFF</span>
                </label>
                <div class="flex justify-between text-xl font-bold"><span>Total</span> <span id="cart-total">R$ 0,00</span></div>
                <button onclick="location.href='checkout.html'" class="w-full bg-[#B91C1C] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-900/20 active:scale-95 transition">Ir para Pagamento</button>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('allvino_cart')) || [];
        function toggleCart() {
            const o = document.getElementById('cart-overlay'), p = document.getElementById('cart-panel');
            if(o.classList.contains('hidden')){ o.classList.remove('hidden'); setTimeout(()=>{ o.classList.remove('opacity-0'); p.classList.remove('translate-x-full'); },10); }
            else { o.classList.add('opacity-0'); p.classList.add('translate-x-full'); setTimeout(()=>o.classList.add('hidden'),300); }
            renderCart();
        }
        function addToCart(n, p, i) {
            const item = cart.find(x => x.nome === n);
            if(item) item.qtd++; else cart.push({nome:n, preco:p, img:i, qtd:1});
            localStorage.setItem('allvino_cart', JSON.stringify(cart));
            document.getElementById('cart-badge').innerText = cart.reduce((a,b)=>a+b.qtd,0);
            document.getElementById('cart-badge').classList.remove('hidden');
        }
        function renderCart() {
            const cont = document.getElementById('cart-items'); cont.innerHTML = '';
            let sub = 0;
            cart.forEach((x, i) => {
                sub += x.preco * x.qtd;
                cont.innerHTML += `<div class="flex gap-4 items-center border-b pb-4"><img src="${x.img}" class="w-16 h-20 object-contain"><div class="flex-1"><p class="font-bold text-sm">${x.nome}</p><p class="text-xs text-stone-400">R$ ${x.preco.toFixed(2)}</p></div><div class="flex items-center gap-2"><button onclick="changeQty(${i},-1)" class="w-6 h-6 border rounded">-</button><span class="text-xs font-bold">${x.qtd}</span><button onclick="changeQty(${i},1)" class="w-6 h-6 border rounded">+</button></div></div>`;
            });
            const desc = document.getElementById('retirada').checked ? sub * 0.05 : 0;
            document.getElementById('cart-total').innerText = `R$ ${(sub - desc).toFixed(2).replace('.', ',')}`;
        }
        function changeQty(i, d) { cart[i].qtd += d; if(cart[i].qtd <= 0) cart.splice(i,1); localStorage.setItem('allvino_cart', JSON.stringify(cart)); renderCart(); }
    </script>
</body>
</html>
