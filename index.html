<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Allvino - Bem-vindo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(to bottom, #FDF9F1, #F9EEDB);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            overflow: hidden;
        }
    </style>
</head>
<body class="w-full flex flex-col justify-between items-center py-12 px-6">
    <div class="pt-10"></div>

    <main class="flex flex-col items-center animate-fade-in">
        <div class="h-16 mb-6">
            <img src="LOGO-ALLVINO-PRETO.png" alt="Allvino Logo" class="h-full w-auto object-contain scale-150">
        </div>
        <p class="text-stone-500 text-sm tracking-[0.3em] uppercase font-medium mt-4">Vinhos & Experiências</p>
    </main>

    <footer class="w-full max-w-sm">
        <button onclick="window.location.href='catalogo.html'" class="w-full py-4 bg-black text-white rounded-2xl text-lg font-bold shadow-xl transition-transform active:scale-95 flex justify-center items-center gap-2">
            Acessar Catálogo
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </footer>
</body>
</html>
